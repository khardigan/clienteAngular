<div class="container-fluid px-4 py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Catálogo de Productos</h2>
    <span class="badge bg-dark rounded-pill">{{ productos.length }} Items</span>
  </div>

  <!-- Formulario de creación -->
  <div *ngIf="mostrarFormulario" class="card border-0 shadow-sm mb-4 rounded-3">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle me-2 text-primary"></i>Nuevo Producto</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold small">Nombre</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoNombre" placeholder="Ej: Leche entera">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small">Descripción</label>
          <input type="text" class="form-control" [(ngModel)]="nuevaDescripcion" placeholder="Ej: Brick de leche 1L">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold small">Precio (€)</label>
          <input type="number" class="form-control" [(ngModel)]="nuevoPrecio" step="0.01" min="0.01">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold small">Cantidad</label>
          <input type="number" class="form-control" [(ngModel)]="nuevaCantidad" min="1" max="1000">
        </div>
        <div class="col-md-4 d-flex align-items-end gap-2">
          <button class="btn btn-primary rounded-pill px-4" (click)="crearProducto()">
            <i class="bi bi-check-lg me-1"></i> Crear
          </button>
          <button class="btn btn-outline-secondary rounded-pill px-3" (click)="toggleFormulario()">
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-5 row-cols-xl-6 g-4">

    <!-- Tarjetas de Productos -->
    <ng-container *ngIf="productos && productos.length > 0">
      <div class="col" *ngFor="let p of productos">
        <div class="producto-card">
          <h5 class="fw-bold text-dark mb-2 text-truncate" [title]="p.nombre">{{ p.nombre }}</h5>
          <p class="text-muted small mb-3 flex-grow-1 line-clamp-3">{{ p.descripcion }}</p>

          <div class="mt-auto">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="fw-bold text-primary">{{ p.precio }} €</span>
              <span class="badge bg-light text-dark border-0">Stock: {{ p.cantidad }}</span>
            </div>

            <p *ngIf="!p.confirmado" class="status-pendiente mb-3">
              <i class="bi bi-exclamation-circle me-1"></i>Pendiente
            </p>

            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm flex-grow-1 rounded-pill">Ver detalle</button>
              <button *ngIf="isLoggedIn" class="btn btn-outline-danger btn-sm rounded-pill px-2"
                title="Eliminar producto" (click)="eliminarProducto(p.id)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Botón de Añadir -->
    <div class="col" *ngIf="isLoggedIn">
      <div class="producto-card d-flex justify-content-center align-items-center border-dashed">
        <button
          class="btn-plus w-100 h-100 border-0 bg-transparent text-primary d-flex flex-column align-items-center justify-content-center py-4"
          (click)="toggleFormulario()">
          <i class="bi bi-plus-circle fs-1 mb-2"></i>
          <span class="fw-bold small text-uppercase">Añadir</span>
        </button>
      </div>
    </div>

  </div>

  <!-- Sin productos -->
  <div *ngIf="!productos || productos.length === 0" class="text-center py-4 mt-2">
    <p class="text-muted small italic">No hay productos en el catálogo todavía.</p>
  </div>
</div>
