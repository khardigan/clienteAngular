<div class="container mt-4">
    <h1>Lista de Usuarios</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Productos Subidos</th>
                <th>Listas Creadas</th>
                <th>Opcion</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let u of usuarios">
                <td>{{ u.id }}</td>
                <td>{{ u.nombre }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.rol }}</td>
                <td>{{ u.listaProductosSubidos.length }}</td>
                <td>{{ u.listasCreadas.length }}</td>
                <td><button (click)="eliminarUsuario(u.id)">Eliminar</button></td>
            </tr>
        </tbody>
    </table>
</div>
