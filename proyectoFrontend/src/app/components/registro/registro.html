<div class="sesion-page-wrapper">
    <main class="flex-grow-1 py-4 py-md-5">
        <div class="container sesion-wrap">
            <h1 class="h3 fw-bold text-center mb-4 sesion-page-title">Únete a LinkedList</h1>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card border-0 rounded-4 shadow-sm sesion-card sesion-card-register">
                        <div class="card-header py-3 fw-semibold border-0 rounded-top-4">
                            Crea tu cuenta de forma gratuita
                        </div>
                        <div class="card-body p-4">
                            <form (ngSubmit)="onRegister()">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="register-name" name="nombre" [(ngModel)]="user.nombre" placeholder="Nombre" autocomplete="off" required>
                                    <label for="register-name">Nombre de usuario</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="register-email" name="email" [(ngModel)]="user.email" placeholder="correo@ejemplo.com" autocomplete="email" required>
                                    <label for="register-email">Email</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="register-password" name="password" [(ngModel)]="user.password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" minlength="8" required>
                                    <label for="register-password">Contraseña</label>
                                </div>
                                <div class="form-floating mb-4">
                                    <input type="password" class="form-control" id="register-password2" name="passwordConfirm" [(ngModel)]="user.passwordConfirm" placeholder="Repite la contraseña" autocomplete="new-password" minlength="8" required>
                                    <label for="register-password2">Confirmar contraseña</label>
                                </div>

                                <div *ngIf="errorRegistro" class="alert alert-danger py-2 small mb-4">
                                    {{ errorRegistro }}
                                </div>

                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" value="" id="register-terms" required>
                                    <label class="form-check-label small" for="register-terms">Acepto los <a href="#" class="text-home-accent">términos de uso</a> y la <a href="#" class="text-home-accent">política de privacidad</a></label>
                                </div>
                                
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-home btn-lg">Registrar mi cuenta</button>
                                    <div class="text-center mt-3">
                                        <span class="text-muted small">¿Ya tienes cuenta? <a routerLink="/login" class="text-home-accent text-decoration-none fw-bold">Inicia sesión</a></span>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-top py-3 mt-auto sesion-footer">
        <div class="container text-center small text-body-secondary mb-0">
            &copy; LinkedList
        </div>
    </footer>
</div>
