<div class="login-container">
  <h2>Iniciar Sesión</h2>

  <form (ngSubmit)="onLogin()">
  <input type="text" name="nombre" [(ngModel)]="credentials.nombre" placeholder="Usuario">
  
  <input type="password" name="password" [(ngModel)]="credentials.password" placeholder="Contraseña">

  <button type="submit">Entrar</button>
</form>

  <p *ngIf="errorLogin" style="color: red;">Usuario o contraseña incorrectos</p>
</div>
