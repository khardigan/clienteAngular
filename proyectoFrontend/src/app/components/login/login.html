<div class="sesion-page-wrapper">


    <main class="flex-grow-1 py-4 py-md-5">
        <div class="container sesion-wrap">
            <h1 class="h3 fw-bold text-center mb-4 sesion-page-title">Bienvenido a LinkedList</h1>

            <div class="row justify-content-center">
                <!-- INICIAR SESIÓN -->
                <div class="col-lg-6 col-md-8">
                    <div class="card border-0 h-100 rounded-4 shadow-sm sesion-card">
                        <div class="card-header py-3 fw-semibold border-0 rounded-top-4">
                            Iniciar sesión
                        </div>
                        <div class="card-body p-4">
                            <form (ngSubmit)="onLogin()">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="login-email" name="nombre" [(ngModel)]="credentials.nombre" placeholder="Usuario" autocomplete="username" required>
                                    <label for="login-email">Usuario / Email</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="login-password" name="password" [(ngModel)]="credentials.password" placeholder="Contraseña" autocomplete="current-password" required>
                                    <label for="login-password">Contraseña</label>
                                </div>
                                <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="" id="login-remember">
                                        <label class="form-check-label small" for="login-remember">Recordarme</label>
                                    </div>
                                    <a href="#" class="small text-decoration-none text-home-accent" (click)="forgotPasswordAlert($event)">¿Olvidaste la contraseña?</a>
                                </div>
                                <button type="submit" class="btn btn-home w-100">Iniciar sesión</button>
                                
                                <p *ngIf="errorLogin" class="text-danger small mt-2 text-center">Usuario o contraseña incorrectos</p>

                                <div class="text-center mt-4 pt-2 border-top">
                                    <span class="text-muted small">¿No tienes cuenta? <a routerLink="/registro" class="text-home-accent text-decoration-none fw-bold">Regístrate gratis</a></span>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-top py-3 mt-auto sesion-footer">
        <div class="container text-center small text-body-secondary mb-0">
            &copy; LinkedList
        </div>
    </footer>
</div>
