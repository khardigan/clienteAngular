<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="producto.css">
</head>

<body>

<main class="d-flex align-items-center justify-content-center min-vh-100 p-3">
    <section class="product-card p-4">

        <!-- HEADER NUEVO -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <small class="text-muted">
                <i class="bi bi-box-seam"></i> Producto
            </small>
            <span class="store-badge">Mercadona</span>
        </div>
    
        <div class="row g-4 align-items-center">
    
            <!-- IMÁGENES -->
            <div class="col-md-6 text-center">
                <img src="https://via.placeholder.com/500"
                     class="img-fluid main-img mb-3"
                     alt="Imagen principal">
    
                <div class="d-flex justify-content-center gap-2">
                    <img src="https://via.placeholder.com/80" class="img-thumbnail thumb">
                    <img src="https://via.placeholder.com/80" class="img-thumbnail thumb">
                    <img src="https://via.placeholder.com/80" class="img-thumbnail thumb">
                </div>
            </div>
    
            <!-- INFO -->
            <div class="col-md-6">
    
                <h2 class="fw-bold mb-2">Nombre del producto</h2>
    
                <p class="text-muted mb-3">
                    Descripción del producto. Ideal para organizar tus compras y no olvidar nada.
                </p>
    
                <!-- PRECIO + INFO EXTRA -->
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div class="price fw-bold">100€</div>
                    <small class="text-muted">
                        <i class="bi bi-clock"></i> añadido recientemente
                    </small>
                </div>
    
                <!-- MINI INFO BOX -->
                <div class="highlight-box mb-3">
                    <i class="bi bi-lightbulb"></i>
                    Suele comprarse 2 veces al mes
                </div>
    
                <div class="divider"></div>
    
                <!-- GESTIÓN DE LISTAS -->
                <h6 class="fw-semibold mb-2">
                    <i class="bi bi-list-check"></i> Añadir a lista
                </h6>
    
                <div class="list-box mb-3">
                    <div class="d-flex gap-2">
                        <div class="dropdown w-100">
                            <button class="btn btn-outline-secondary dropdown-toggle w-100 btn-custom"
                                    type="button"
                                    data-bs-toggle="dropdown">
                                Seleccionar lista
                            </button>
    
                            <ul class="dropdown-menu w-100">
                                <li><a class="dropdown-item" href="#">Compra semanal</a></li>
                                <li><a class="dropdown-item" href="#">Fiesta</a></li>
                                <li><a class="dropdown-item" href="#">Casa</a></li>
                            </ul>
                        </div>
    
                        <button class="btn btn-primary btn-custom">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </div>
    
                <!-- FOOTER -->
                <small class="text-muted d-block text-end">
                    Organiza mejor tus compras 🧠
                </small>
    
            </div>
    
        </div>
    
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
